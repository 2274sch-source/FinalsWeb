<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delusional Stories</title>
    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; font-family: 'Helvetica', 'Arial', sans-serif; color: #000000; min-height: 100vh; display: flex; flex-direction: column; border-top: 5px solid #d00000; }
        nav { display: flex; justify-content: space-between; padding: 20px 40px; }
        .nav-btn { background-color: #000; color: #fff; padding: 10px 20px; text-decoration: none; font-weight: bold; font-size: 2rem; border-radius: 8px; text-transform: uppercase; }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        .description { max-width: 600px; font-size: 1.1rem; line-height: 1.4; text-align: left; margin-bottom: 30px; }
        .title-container { border: 2px solid #000; padding: 40px 80px; margin-bottom: 40px; }
        .title-container h1 { font-size: 3rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
        
        
        .story-menu { list-style: none; text-align: center; }
        .story-menu li { margin: 15px 0; }
        .story-link { color: #000; text-decoration: none; font-size: 1.5rem; font-weight: bold; border-bottom: 2px solid transparent; transition: 0.3s; }
        .story-link:hover { border-bottom: 2px solid #d00000; color: #d00000; }   
        
         /* Tablet */
        @media screen and (max-width: 992px) {

            .title-container {
                padding: 30px 50px;
            }

            .title-container h1 {
                font-size: 2.2rem;
            }

            .nav-btn {
                font-size: 1.5rem;
            }
        }

        /* Mobile */
        @media screen and (max-width: 600px) {

            nav {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .nav-btn {
                font-size: 1rem;
                width: 100%;
                text-align: center;
            }

            .title-container {
                padding: 20px;
            }

            .title-container h1 {
                font-size: 1.5rem;
                text-align: center;
            }

            .story-link {
                font-size: 1.1rem;
            }

            .description {
                font-size: 0.95rem;
                text-align: center;
            }
        }
        
    </style>
    
</head>
<body>
    <nav>
        <a href="index.html" class="nav-btn">HOME</a>
        <a href="#" class="nav-btn">ABOUT</a>
    </nav>
    <main>
        <div class="description">
            <p>Delusional Stories explores the thin, jagged line between conviction and collapse...</p>
        </div>
        <div class="title-container">
            <h1>DELUSIONAL STORIES</h1>
        </div>
        <ul class="story-menu">
            <li><a href="./Content/Book-1.html" class="story-link">1. The Gravity of Color</a></li>
            <li><a href="./Content/Book-2.html" class="story-link">2. The Soul-Basin's Vigil</a></li>
            <li><a href="./Content/Book-3.html" class="story-link">3. The Gilded Signal</a></li>
            <li><a href="./Content/Book-4.html" class="story-link">4. The Sentinel's Gaze</a></li>
            <li><a href="./Content/Book-6.html" class="story-link">6. The Conductor of the Ten Realms</a></li>
        </ul>
    </main>
</body>
</html>
